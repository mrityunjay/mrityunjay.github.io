<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->

  <meta name="keywords" content="free online calculator, EMI calculator, FD calculator, SIP calculator, income tax calculator, BMI calculator, password generator, QR code generator, pomodoro timer, expense tracker, selenium framework, test automation, autotrader, Mrityunjay Ranjan" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />

  <meta property="og:url" content="https://mrityunjay.github.io/" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Mrityunjay Ranjan — Free Web Apps & Projects" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Mrityunjay Ranjan",
    "url": "https://mrityunjay.github.io/",
    "sameAs": ["https://github.com/mrityunjay"],
    "jobTitle": "Software Engineer"
  }
  </script>

  <style>
    :root {
      --bg: #0a0e1a;
      --card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.09);
      --text: #e8eaf2;
      --muted: #8b93a7;
      --a1: #7c5cff;
      --a2: #ff5ca8;
      --a3: #21d4fd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated aurora background */
    .aurora { position: fixed; inset: 0; z-index: -2; overflow: hidden; }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.55;
      animation: float 18s ease-in-out infinite;
    }
    .blob.b1 { width: 480px; height: 480px; background: var(--a1); top: -120px; left: -80px; }
    .blob.b2 { width: 420px; height: 420px; background: var(--a2); top: 30%; right: -120px; animation-delay: -6s; }
    .blob.b3 { width: 460px; height: 460px; background: var(--a3); bottom: -160px; left: 30%; animation-delay: -12s; }
    @keyframes float {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(40px,-30px) scale(1.1); }
      66% { transform: translate(-30px,40px) scale(0.95); }
    }
    body::after {
      content: ""; position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle at 50% 0%, transparent, var(--bg) 70%);
    }

    .wrap { max-width: 1080px; margin: 0 auto; padding: 0 20px; }

    /* Hero */
    header { text-align: center; padding: 80px 20px 40px; }
    .badge {
      display: inline-block; padding: 6px 14px; border-radius: 999px;
      background: var(--card); border: 1px solid var(--border);
      font-size: 0.8rem; color: var(--muted); margin-bottom: 22px;
      backdrop-filter: blur(10px);
    }
    .badge .dot { color: #34d399; }
    h1 {
      font-size: clamp(2.4rem, 6vw, 4rem); line-height: 1.05; letter-spacing: -0.02em;
      background: linear-gradient(110deg, #fff 20%, var(--a1) 50%, var(--a2) 80%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    header p.tag { color: var(--muted); font-size: 1.1rem; max-width: 560px; margin: 0 auto 28px; }
    .stats { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; }
    .stat strong { display: block; font-size: 1.6rem; background: linear-gradient(120deg,var(--a3),var(--a1)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .stat span { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

    /* Controls */
    .controls { position: sticky; top: 0; z-index: 10; padding: 18px 0; background: rgba(10,14,26,0.7); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    #search {
      width: 100%; padding: 13px 18px; border-radius: 12px; font-size: 1rem;
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      margin-bottom: 14px;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { outline: none; border-color: var(--a1); }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      padding: 8px 16px; border-radius: 999px; border: 1px solid var(--border);
      background: var(--card); color: var(--muted); font-size: 0.85rem; cursor: pointer;
      transition: all 0.18s;
    }
    .chip:hover { color: var(--text); }
    .chip.active { background: linear-gradient(120deg,var(--a1),var(--a2)); color: #fff; border-color: transparent; }

    /* Grid + cards */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 18px; padding-bottom: 40px; }
    .card {
      position: relative; background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px; backdrop-filter: blur(10px);
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column;
    }
    .card:hover { transform: translateY(-6px); border-color: rgba(124,92,255,0.6); box-shadow: 0 18px 50px rgba(124,92,255,0.18); }
    .card .icon { font-size: 1.7rem; margin-bottom: 12px; }
    .card h3 { font-size: 1.1rem; margin-bottom: 6px; }
    .card p { color: var(--muted); font-size: 0.88rem; line-height: 1.5; flex: 1; margin-bottom: 14px; }
    .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .lang { font-size: 0.72rem; color: var(--muted); padding: 3px 9px; border: 1px solid var(--border); border-radius: 999px; }
    .links { margin-left: auto; display: flex; gap: 8px; }
    .links a { font-size: 0.82rem; text-decoration: none; padding: 5px 12px; border-radius: 8px; transition: 0.18s; }
    .links a.live { background: linear-gradient(120deg,var(--a1),var(--a2)); color: #fff; }
    .links a.live:hover { filter: brightness(1.12); }
    .links a.code { color: var(--muted); border: 1px solid var(--border); }
    .links a.code:hover { color: var(--text); border-color: var(--a1); }

    .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 8px 0 16px; }
    .empty-msg { color: var(--muted); text-align: center; padding: 40px; grid-column: 1/-1; }

    footer { text-align: center; padding: 40px 20px 60px; color: var(--muted); font-size: 0.85rem; }
    footer a { color: var(--a3); text-decoration: none; }
  </style>
</head>
<body>
  <div class="aurora"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

  <header>
    <span class="badge"><span class="dot">●</span> Live &amp; free — no ads, no sign-up</span>
    <h1>Mrityunjay Ranjan</h1>
    <p class="tag">A collection of free web apps, calculators and open-source projects. Built with care — pick anything below to launch it.</p>
    <div class="stats">
      <div class="stat"><strong>20</strong><span>Live web apps</span></div>
      <div class="stat"><strong>13</strong><span>Projects &amp; tools</span></div>
      <div class="stat"><strong>100%</strong><span>Free</span></div>
    </div>
  </header>

  <div class="wrap">
    <div class="controls">
      <input type="text" id="search" placeholder="🔍  Search apps and projects…" aria-label="Search" />
      <div class="chips" id="chips">
        <button class="chip active" data-cat="all">All</button>
        <button class="chip" data-cat="calculator">Calculators</button>
        <button class="chip" data-cat="tool">Everyday Tools</button>
        <button class="chip" data-cat="automation">Test Automation</button>
        <button class="chip" data-cat="project">Projects</button>
      </div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <footer>
    <p>Built by Mrityunjay Ranjan · <a href="https://github.com/mrityunjay" target="_blank" rel="noopener">github.com/mrityunjay</a></p>
  </footer>

  <script>
    const base = "https://mrityunjay.github.io/";
    const gh = "https://github.com/mrityunjay/";
    const items = [
      // Calculators
      { t: "FD Calculator", d: "Estimate the maturity amount of a fixed deposit.", c: "calculator", i: "🏦", live: "fd-calculator", lang: "JavaScript" },
      { t: "EMI Calculator", d: "Work out monthly instalments for any loan.", c: "calculator", i: "💳", live: "emi-calculator", lang: "JavaScript" },
      { t: "SIP Calculator", d: "Project returns on monthly mutual-fund investments.", c: "calculator", i: "📈", live: "sip-calculator", lang: "JavaScript" },
      { t: "Income Tax Calculator", d: "Estimate Indian income tax (new regime, FY 2024-25).", c: "calculator", i: "🧾", live: "income-tax-calculator", lang: "JavaScript" },
      { t: "BMI Calculator", d: "Check your Body Mass Index and category.", c: "calculator", i: "⚖️", live: "bmi-calculator", lang: "JavaScript" },
      { t: "Age Calculator", d: "Find your exact age from your date of birth.", c: "calculator", i: "🎂", live: "age-calculator", lang: "JavaScript" },
      { t: "Tip Calculator", d: "Split a bill and calculate the tip per person.", c: "calculator", i: "🍽️", live: "tip-calculator", lang: "JavaScript" },
      { t: "Unit Converter", d: "Convert length, weight and temperature units.", c: "calculator", i: "📐", live: "unit-converter", lang: "JavaScript" },
      { t: "Currency Converter", d: "Convert currencies using live exchange rates.", c: "calculator", i: "💱", live: "currency-converter", lang: "JavaScript" },
      { t: "Compound Interest", d: "See how money grows with compound interest.", c: "calculator", i: "💰", live: "compound-interest-calculator", lang: "JavaScript" },
      // Everyday tools
      { t: "To-Do List", d: "Track tasks; saved in your browser.", c: "tool", i: "✅", live: "todo-list", lang: "JavaScript" },
      { t: "Notes Keeper", d: "Jot quick sticky notes that persist locally.", c: "tool", i: "🗒️", live: "notes-keeper", lang: "JavaScript" },
      { t: "Password Generator", d: "Generate strong, random, secure passwords.", c: "tool", i: "🔐", live: "password-generator", lang: "JavaScript" },
      { t: "QR Code Generator", d: "Turn any text or link into a QR code.", c: "tool", i: "🔳", live: "qr-generator", lang: "JavaScript" },
      { t: "Pomodoro Timer", d: "Focus timer with work and break sessions.", c: "tool", i: "🍅", live: "pomodoro-timer", lang: "JavaScript" },
      { t: "Stopwatch", d: "Time anything, with lap recording.", c: "tool", i: "⏱️", live: "stopwatch", lang: "JavaScript" },
      { t: "Color Palette", d: "Generate random palettes; click to copy hex.", c: "tool", i: "🎨", live: "color-palette", lang: "JavaScript" },
      { t: "Markdown Previewer", d: "Write Markdown and see it rendered live.", c: "tool", i: "📝", live: "markdown-previewer", lang: "JavaScript" },
      { t: "Word Counter", d: "Live word, character and reading-time counts.", c: "tool", i: "🔢", live: "word-counter", lang: "JavaScript" },
      { t: "Expense Tracker", d: "Track daily expenses; saved in your browser.", c: "tool", i: "💸", live: "expense-tracker", lang: "JavaScript" },
      // Test automation
      { t: "Automation Framework", d: "Web UI test automation framework.", c: "automation", i: "🤖", code: "AutomationFramework", lang: "Selenium" },
      { t: "Selenium Advanced", d: "Advanced Selenium test cases and patterns.", c: "automation", i: "🧪", code: "SeleniumAdvanced", lang: "Java" },
      { t: "Selenium Maven", d: "Selenium test suite with a Maven build.", c: "automation", i: "☕", code: "SeleniumMaven", lang: "Java" },
      { t: "Selenium Java", d: "Browser automation scripts in Java.", c: "automation", i: "🧭", code: "selenium-java", lang: "Java" },
      { t: "Java Selenium Workshop", d: "Workshop material for Java + Selenium.", c: "automation", i: "🎓", code: "Java-Selenium-Workshop", lang: "Java" },
      { t: "TestCafe + Cucumber", d: "BDD end-to-end tests with TestCafe and Cucumber.", c: "automation", i: "🥒", code: "testcafe-cucumber", lang: "JavaScript" },
      { t: "Calculator (Node + Mocha)", d: "Calculator with Mocha.js unit tests.", c: "automation", i: "🧮", code: "Calculator-Node-MochaJs", lang: "JavaScript" },
      { t: "BrowserStack Examples", d: "Cross-browser testing on BrowserStack.", c: "automation", i: "🌐", code: "BrowserStack", lang: "Java" },
      // Projects
      { t: "AutoTrader", d: "Automated NSE intraday trading system using the Angel One SmartAPI.", c: "project", i: "📊", code: "autotrader", lang: "Python" },
      { t: "Aggregation", d: "A Java object aggregation framework.", c: "project", i: "🧩", code: "Aggregation", lang: "Java" },
      { t: "MailParser", d: "Email parsing utility written in Python.", c: "project", i: "📧", code: "MailParser", lang: "Python" },
      { t: "Hello World in ML", d: "A simple hello-world program for machine learning.", c: "project", i: "🧠", code: "HelloWorldInML", lang: "Jupyter" },
    ];

    const grid = document.getElementById("grid");
    const search = document.getElementById("search");
    let activeCat = "all";

    function cardHTML(it) {
      const liveLink = it.live ? `<a class="live" href="${base}${it.live}/" target="_blank" rel="noopener">Live ↗</a>` : "";
      const codeRepo = it.code || it.live;
      const codeLink = `<a class="code" href="${gh}${codeRepo}" target="_blank" rel="noopener">Code ↗</a>`;
      return `<article class="card">
        <div class="icon">${it.i}</div>
        <h3>${it.t}</h3>
        <p>${it.d}</p>
        <div class="meta">
          <span class="lang">${it.lang}</span>
          <span class="links">${liveLink}${codeLink}</span>
        </div>
      </article>`;
    }

    function render() {
      const q = search.value.trim().toLowerCase();
      const filtered = items.filter((it) => {
        const matchCat = activeCat === "all" || it.c === activeCat;
        const matchQ = !q || (it.t + " " + it.d).toLowerCase().includes(q);
        return matchCat && matchQ;
      });
      grid.innerHTML = filtered.length
        ? filtered.map(cardHTML).join("")
        : '<p class="empty-msg">No matches — try a different search.</p>';
    }

    document.getElementById("chips").addEventListener("click", (e) => {
      if (!e.target.classList.contains("chip")) return;
      document.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
      e.target.classList.add("active");
      activeCat = e.target.dataset.cat;
      render();
    });
    search.addEventListener("input", render);
    render();
  </script>
</body>
</html>
